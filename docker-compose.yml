services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crypto}
      POSTGRES_USER: ${POSTGRES_USER:-crypto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crypto}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - crypto-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto} -d ${POSTGRES_DB:-crypto}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crypto-pgdata:
